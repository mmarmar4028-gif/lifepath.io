<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лайни</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #0f0f1a, #1c1c2e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* контейнер */
.container {
    text-align: center;
    padding: 20px;
    max-width: 400px;
}

/* заголовок */
h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

/* подзаголовок */
.subtitle {
    color: #aaa;
    margin-bottom: 25px;
}

/* персонаж */
.character img {
    width: 120px;
    height: auto;
    margin-bottom: 25px;
}

/* описание */
.description {
    font-size: 14px;
    line-height: 1.5;
    color: #ccc;
    margin-bottom: 30px;
}

/* кнопка */
.start-btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #a78bfa;
    color: white;
    cursor: pointer;
}

.start-btn:active {
    background: #8b5cf6;
}

/* нижний текст */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<div class="container">

    <h1>Лайни</h1>
    <div class="subtitle">путь вверх никогда не бывает прямым</div>

    <div class="character">
        <img src="MASHA.png" alt="character">
    </div>

    <div class="description">
       Помоги Маше пройти свой путь. Преодолевай препятствия, совершай ошибки и становись лучше.
    </div>

    <button class="start-btn" onclick="startGame()">
        Начать путь
    </button>

    <div class="footer">
        игра лучше всего работает на телефоне
    </div>

</div>

<script>
function startGame() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
