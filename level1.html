<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лайни — уровень 1</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #111, #1c1c2e);
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,20,40,0.95);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
    display: none;
    width: 80%;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #a78bfa;
    color: white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="gameOver" class="overlay">
    ничего страшного, мы же не роботы  
    <br>давай попробуем снова!
    <br><br>
    <button onclick="restart()">ещё раз</button>
</div>

<div id="win" class="overlay">
    ты справилась с этим этапом 💜  
    <br>идём дальше
    <br><br>
    <button onclick="menu()">дальше</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === ПЕРСОНАЖ ===
const img = new Image();
img.src = "MASHA.png";

const player = {
    x: 100,
    y: canvas.height - 190,
    w: 90,
    h: 120,
    dy: 0,
    gravity: 0.5,
    jumps: 0,
    maxJumps: 2,
    crouch: false
};

// === ПРЕПЯТСТВИЯ ===
let obstacles = [];

function randomObstacle(x) {
    const types = ["ground", "air", "gap"];
    const type = types[Math.floor(Math.random()*types.length)];
    return {
        x: x,
        type: type,
        width: type === "gap" ? 120 : 60,
        height: 60,
        label: getLabel(type)
    };
}

function getLabel(type) {
    const map = {
        ground: ["съесть суп", "выучить стих", "утренник"],
        air: ["танцы", "соревнование", "родители"],
        gap: ["неуверенность", "страх ошибки"]
    };
    const arr = map[type];
    return arr[Math.floor(Math.random()*arr.length)];
}

// создаём уровень
for (let i = 1; i < 20; i++) {
    obstacles.push(randomObstacle(i * 450));
}

// === УПРАВЛЕНИЕ ===
window.addEventListener("keydown", control);
window.addEventListener("touchstart", control);

function control(e) {
    if (player.jumps < player.maxJumps) {
        player.dy = -12;
        player.jumps++;
    } else {
        player.crouch = true;
        setTimeout(() => player.crouch = false, 500);
    }
}

// === ЛОГИКА ===
let gameOver = false;
let win = false;

function update() {
    if (gameOver || win) return;

    // движение игрока
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= canvas.height - 160) {
        player.y = canvas.height - 160;
        player.jumps = 0;
    }

    // движение препятствий
    obstacles.forEach(o => {
        o.x -= 4;
    });

    // проверка столкновений
    obstacles.forEach(o => {
        if (!o.renderY) return;

        if (
            player.x < o.x + o.renderW &&
            player.x + player.w > o.x &&
            player.y < o.renderY + o.renderH &&
            player.y + player.h > o.renderY
        ) {
            lose();
        }
    });

    // проверка финиша
    if (obstacles[obstacles.length-1].x < 100) {
        win = true;
        document.getElementById("win").style.display = "block";
    }
}

function lose() {
    gameOver = true;
    document.getElementById("gameOver").style.display = "block";
}

// === ОТРИСОВКА ===
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // === ФОН С ФРАЗАМИ ===
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.font = "14px Arial";

    const bgPhrases = [
        "я справлюсь",
        "это временно",
        "я уже проходила сложнее",
        "ошибаться нормально",
        "двигаюсь дальше"
    ];

    for (let i = 0; i < 20; i++) {
        let x = (i * 300 - (performance.now()/20) % 300);
        let y = (i * 80) % canvas.height;
        ctx.fillText(bgPhrases[i % bgPhrases.length], x, y);
    }

    // === КРУТОЙ СКЛОН ===
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 60);
    ctx.lineTo(canvas.width, canvas.height - 260); // БЫЛО -120 → теперь круче
    ctx.strokeStyle = "#a78bfa";
    ctx.lineWidth = 3;
    ctx.stroke();

    // === ПЕРСОНАЖ ===
    if (img.complete) {
        ctx.drawImage(img, player.x, player.y, player.w, player.h);
    }

    // === ПРЕПЯТСТВИЯ ===
    obstacles.forEach(o => {
        let y;

        if (o.type === "ground") {
            y = canvas.height - 180;
        } else if (o.type === "air") {
            y = canvas.height - 320;
        } else if (o.type === "gap") {
            // нормальный обрыв (не чёрный блок)
            ctx.fillStyle = "#111";
            ctx.fillRect(o.x, canvas.height - 80, 100, 80);
            return;
        }

        let w = 80;
        let h = 50;

        ctx.fillStyle = "rgba(167,139,250,0.25)";
        ctx.strokeStyle = "rgba(167,139,250,0.8)";
        ctx.lineWidth = 1;

        roundRect(ctx, o.x, y, w, h, 12);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText(o.label, o.x + 10, y + 28);

        o.renderY = y;
        o.renderW = w;
        o.renderH = h;
    });
}
}

// === ЦИКЛ ===
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// === КНОПКИ ===
function restart() {
    location.reload();
}

function menu() {
    window.location.href = "menu.html";
}

// === Вспомогательные функции ===
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}
</script>

</body>
</html>
