<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лайни — уровень 1</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #111, #1c1c2e);
    font-family: Arial, sans-serif;
}

/* canvas */
canvas {
    display: block;
}

/* overlay при проигрыше */
#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,20,40,0.95);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
    display: none;
    width: 80%;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #a78bfa;
    color: white;
    font-size: 14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="gameOver">
    <div>
        ничего страшного, мы же не роботы, а люди и учимся на ошибках.  
        давай попробуем снова!
    </div>
    <button onclick="restart()">ещё раз</button>
    <button onclick="menu()">в меню</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === ПЕРСОНАЖ ===
const player = {
    x: 100,
    y: canvas.height - 150,
    width: 50,
    height: 70,
    dy: 0,
    gravity: 0.6,
    jump: -12,
    grounded: true
};

// === ПРЕПЯТСТВИЯ ===
const obstacleTexts = [
"съесть суп",
"тренировка",
"танцы",
"выучить стих",
"утренник",
"письмо деду морозу",
"не разозлить родителей"
];

let obstacles = [];

// создание препятствий
function createObstacle(x) {
    return {
        x: x,
        y: canvas.height - 100,
        width: 40,
        height: 60,
        text: obstacleTexts[Math.floor(Math.random()*obstacleTexts.length)]
    };
}

// наполняем уровень
for (let i = 1; i <= 7; i++) {
    obstacles.push(createObstacle(i * 400));
}

// === УПРАВЛЕНИЕ ===
window.addEventListener("keydown", jump);
window.addEventListener("touchstart", jump);

function jump() {
    if (player.grounded) {
        player.dy = player.jump;
        player.grounded = false;
    }
}

// === ФОН (иконки) ===
function drawIcons() {
    ctx.strokeStyle = "rgba(167,139,250,0.2)";

    ctx.strokeRect(50,100,30,40); // книги
    ctx.strokeRect(200,200,50,30); // ноут
    ctx.beginPath();
    ctx.arc(300,150,15,0,Math.PI*2); // яблоко
    ctx.stroke();
}

// === ОБНОВЛЕНИЕ ===
let gameOver = false;

function update() {
    if (gameOver) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y > canvas.height - 150) {
        player.y = canvas.height - 150;
        player.dy = 0;
        player.grounded = true;
    }

    obstacles.forEach(o => {
        o.x -= 4;

        // столкновение
        if (
            player.x < o.x + o.width &&
            player.x + player.width > o.x &&
            player.y < o.y + o.height &&
            player.y + player.height > o.y
        ) {
            gameOver = true;
            document.getElementById("gameOver").style.display = "block";
        }
    });
}

// === ОТРИСОВКА ===
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // фон
    drawIcons();

    // земля (наклон)
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 80);
    ctx.lineTo(canvas.width, canvas.height - 120);
    ctx.strokeStyle = "#a78bfa";
    ctx.lineWidth = 4;
    ctx.stroke();

    // персонаж
    ctx.fillStyle = "#a78bfa";
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // препятствия
    obstacles.forEach(o => {
        ctx.fillStyle = "#888";
        ctx.fillRect(o.x, o.y, o.width, o.height);

        ctx.fillStyle = "#fff";
        ctx.font = "10px Arial";
        ctx.fillText(o.text, o.x - 20, o.y - 10);
    });
}

// === ЦИКЛ ===
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();

// === КНОПКИ ===
function restart() {
    location.reload();
}

function menu() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
