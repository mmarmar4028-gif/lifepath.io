<div><br class="Apple-interchange-newline"><!DOCTYPE html><br><html lang="ru"><br><head><br><meta charset="UTF-8"><br><meta name="viewport" content="width=device-width, initial-scale=1.0"><br><title>Лайни — уровень 1</title><br><br><style><br>body {<br>    margin: 0;<br>    overflow: hidden;<br>    background: #0e0e1a;<br>    font-family: Arial;<br>}<br><br>canvas {<br>    display: block;<br>}<br><br>.overlay {<br>    position: absolute;<br>    top: 50%;<br>    left: 50%;<br>    transform: translate(-50%, -50%);<br>    background: rgba(20,20,40,0.95);<br>    padding: 20px;<br>    border-radius: 12px;<br>    text-align: center;<br>    color: white;<br>    display: none;<br>}<br><br>button {<br>    margin-top: 10px;<br>    padding: 10px 20px;<br>    border: none;<br>    border-radius: 8px;<br>    background: #a78bfa;<br>    color: white;<br>}<br></style><br></head><br><br><body><br><br><canvas id="game"></canvas><br><br><div id="gameOver" class="overlay"><br>    ничего страшного, мы же не роботы  <br>    <br>давай попробуем снова!<br>    <br><br><br>    <button onclick="restart()">ещё раз</button><br></div><br><br><div id="win" class="overlay"><br>    ты справилась 💜  <br>    <br>идём дальше<br>    <br><br><br>    <button onclick="menu()">дальше</button><br></div><br><br><script><br>const canvas = document.getElementById("game");<br>const ctx = canvas.getContext("2d");<br><br>canvas.width = window.innerWidth;<br>canvas.height = window.innerHeight;<br><br>// === ПЕРСОНАЖ ===<br>const img = new Image();<br>img.src = "MASHA.png";<br><br>let time = 0;<br><br>const player = {<br>    x: 100,<br>    y: canvas.height - 200,<br>    w: 90,<br>    h: 120,<br>    dy: 0,<br>    gravity: 0.6,<br>    jumps: 0,<br>    maxJumps: 2<br>};<br><br>// === ПРЕПЯТСТВИЯ ===<br>let obstacles = [];<br><br>function randomObstacle(x) {<br>    const types = ["ground", "air", "gap"];<br>    const type = types[Math.floor(Math.random()*types.length)];<br><br>    return {<br>        x: x,<br>        type: type,<br>        label: getLabel(type)<br>    };<br>}<br><br>function getLabel(type) {<br>    const map = {<br>        ground: ["съесть суп","выучить стих","утренник,"],<br>        air: ["танцы","конкурс","садик"],<br>        gap: ["страх","сомнения"]<br>    };<br>    const arr = map[type];<br>    return arr[Math.floor(Math.random()*arr.length)];<br>}<br><br>for (let i = 1; i < 20; i++) {<br>    obstacles.push(randomObstacle(i * 450));<br>}<br><br>// === УПРАВЛЕНИЕ ===<br>window.addEventListener("keydown", jump);<br>window.addEventListener("touchstart", jump);<br><br>function jump() {<br>    if (player.jumps < player.maxJumps) {<br>        player.dy = -13;<br>        player.jumps++;<br>    }<br>}<br>    <br>// === ЛОГИКА ===<br>let gameOver = false;<br>let win = false;<br><br>function update() {<br>    if (gameOver || win) return;<br><br>    time += 0.05;<br><br>    player.dy += player.gravity;<br>    player.y += player.dy;<br><br>    if (player.y >= canvas.height - 200) {<br>        player.y = canvas.height - 200;<br>        player.jumps = 0;<br>    }<br><br>    obstacles.forEach(o => o.x -= 4);<br><br>    obstacles.forEach(o => {<br>        if (!o.renderY) return;<br><br>        if (<br>            player.x < o.x + o.renderW &&<br>            player.x + player.w > o.x &&<br>            player.y < o.renderY + o.renderH &&<br>            player.y + player.h > o.renderY<br>        ) {<br>            lose();<br>        }<br>    });<br><br>    if (obstacles[obstacles.length-1].x < 100) {<br>        win = true;<br>        document.getElementById("win").style.display = "block";<br>    }<br>}<br><br>function lose() {<br>    gameOver = true;<br>    document.getElementById("gameOver").style.display = "block";<br>}<br><br>// === ОТРИСОВКА ===<br>function draw() {<br>    ctx.clearRect(0,0,canvas.width,canvas.height);<br><br>    // === ПАРАЛЛАКС ===<br>    ctx.fillStyle = "#141428";<br>    ctx.fillRect(0,0,canvas.width,canvas.height);<br><br>    // дальний слой<br>    ctx.fillStyle = "rgba(167,139,250,0.05)";<br>    for (let i = 0; i < 10; i++) {<br>        ctx.fillRect((i*300 - time*20)%canvas.width, 100 + i*50, 200, 2);<br>    }<br><br>    // === ФРАЗЫ ===<br>    ctx.fillStyle = "rgba(255,255,255,0.15)";<br>    ctx.font = "14px Arial";<br><br>    const phrases = [<br>        "я справлюсь",<br>        "всё получится",<br>        "я уже сильнее",<br>        "это не навсегда",<br>        "двигаюсь дальше"<br>    ];<br><br>    for (let i = 0; i < 15; i++) {<br>        let x = (i*250 - time*60) % canvas.width;<br>        let y = (i*80) % canvas.height;<br>        ctx.fillText(phrases[i%phrases.length], x, y);<br>    }<br><br>    // === СКЛОН ===<br>    ctx.beginPath();<br>    ctx.moveTo(0, canvas.height - 60);<br>    ctx.lineTo(canvas.width, canvas.height - 260);<br>    ctx.strokeStyle = "#a78bfa";<br>    ctx.lineWidth = 3;<br>    ctx.stroke();<br><br>    // === СВЕТ ВВЕРХУ ===<br>    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);<br>    gradient.addColorStop(0, "rgba(167,139,250,0.25)");<br>    gradient.addColorStop(1, "transparent");<br><br>    ctx.fillStyle = gradient;<br>    ctx.fillRect(0,0,canvas.width,canvas.height);<br><br>    // === ПЕРСОНАЖ (АНИМАЦИЯ) ===<br>    if (img.complete) {<br>        let bob = Math.sin(time*2) * 4;<br>        ctx.drawImage(<br>            img,<br>            player.x,<br>            player.y + bob,<br>            player.w,<br>            player.h<br>        );<br>    }<br><br>    // === ПРЕПЯТСТВИЯ ===<br>    obstacles.forEach(o => {<br>        let y;<br><br>        if (o.type === "ground") y = canvas.height - 180;<br>        else if (o.type === "air") y = canvas.height - 320;<br>        else {<br>            ctx.fillStyle = "#0e0e1a";<br>            ctx.fillRect(o.x, canvas.height - 80, 100, 80);<br>            return;<br>        }<br><br>        let w = 80;<br>        let h = 50;<br><br>        ctx.fillStyle = "rgba(167,139,250,0.25)";<br>        ctx.strokeStyle = "rgba(167,139,250,0.8)";<br><br>        roundRect(ctx, o.x, y, w, h, 12);<br>        ctx.fill();<br>        ctx.stroke();<br><br>        ctx.fillStyle = "#fff";<br>        ctx.font = "12px Arial";<br>        ctx.fillText(o.label, o.x + 10, y + 28);<br><br>        o.renderY = y;<br>        o.renderW = w;<br>        o.renderH = h;<br>    });<br>}<br><br>// === ЦИКЛ ===<br>function loop() {<br>    update();<br>    draw();<br>    requestAnimationFrame(loop);<br>}<br>loop();<br><br>// === КНОПКИ ===<br>function restart() {<br>    location.reload();<br>}<br><br>function menu() {<br>    window.location.href = "menu.html";<br>}<br><br>// === ФИГУРА ===<br>function roundRect(ctx, x, y, w, h, r) {<br>    ctx.beginPath();<br>    ctx.moveTo(x+r,y);<br>    ctx.lineTo(x+w-r,y);<br>    ctx.quadraticCurveTo(x+w,y,x+w,y+r);<br>    ctx.lineTo(x+w,y+h-r);<br>    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);<br>    ctx.lineTo(x+r,y+h);<br>    ctx.quadraticCurveTo(x,y+h,x,y+h-r);<br>    ctx.lineTo(x,y+r);<br>    ctx.quadraticCurveTo(x,y,x+r,y);<br>    ctx.closePath();<br>}<br></script><br><br></body><br></html></div>
