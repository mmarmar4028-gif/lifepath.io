<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лайни — уровень 1</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #111, #1c1c2e);
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

/* окна */
.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,20,40,0.95);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
    display: none;
    width: 80%;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #a78bfa;
    color: white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="gameOver" class="overlay">
    ничего страшного, мы же не роботы  
    <br>давай попробуем снова!
    <br><br>
    <button onclick="restart()">ещё раз</button>
</div>

<div id="win" class="overlay">
    ты справилась с этим этапом 💜  
    <br>идём дальше
    <br><br>
    <button onclick="menu()">дальше</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === ПЕРСОНАЖ (КАРТИНКА) ===
const img = new Image();
img.src = "MASHA.png";

const player = {
    x: 100,
    y: canvas.height - 160,
    w: 70,
    h: 90,
    dy: 0,
    gravity: 0.6,
    jumps: 0,
    maxJumps: 2,
    crouch: false
};

// === ПРЕПЯТСТВИЯ ===
let obstacles = [];

function randomObstacle(x) {
    const types = ["ground", "air", "gap"];

    const type = types[Math.floor(Math.random()*types.length)];

    return {
        x: x,
        type: type,
        width: 50,
        height: 60,
        label: getLabel(type)
    };
}

function getLabel(type) {
    const map = {
        ground: [
            "съесть суп",
            "выучить стих",
            "утренник"
        ],
        air: [
            "танцы",
            "соревнование",
            "родители"
        ],
        gap: [
            "неуверенность",
            "страх ошибки"
        ]
    };

    const arr = map[type];
    return arr[Math.floor(Math.random()*arr.length)];
}

// создаём уровень (~30 сек)
for (let i = 1; i < 40; i++) {
    obstacles.push(randomObstacle(i * 250));
}

// === УПРАВЛЕНИЕ ===
window.addEventListener("keydown", control);
window.addEventListener("touchstart", control);

function control(e) {
    if (player.jumps < player.maxJumps) {
        player.dy = -12;
        player.jumps++;
    } else {
        player.crouch = true;
        setTimeout(() => player.crouch = false, 500);
    }
}

// === ЛОГИКА ===
let gameOver = false;
let win = false;

function update() {
    if (gameOver || win) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= canvas.height - 160) {
        player.y = canvas.height - 160;
        player.jumps = 0;
    }

    obstacles.forEach(o => {
        o.x -= 4;

        // столкновения
        if (o.type === "ground") {
            if (
                player.x < o.x + o.width &&
                player.x + player.w > o.x &&
                player.y + player.h > canvas.height - 100
            ) {
                lose();
            }
        }

        if (o.type === "air" && !player.crouch) {
            if (
                player.x < o.x + o.width &&
                player.x + player.w > o.x &&
                player.y < canvas.height - 220
            ) {
                lose();
            }
        }

        if (o.type === "gap") {
            if (
                player.x > o.x &&
                player.x < o.x + o.width &&
                player.y >= canvas.height - 160
            ) {
                lose();
            }
        }
    });

    // финиш
    if (obstacles[obstacles.length-1].x < 100) {
        win = true;
        document.getElementById("win").style.display = "block";
    }
}

function lose() {
    gameOver = true;
    document.getElementById("gameOver").style.display = "block";
}

// === ОТРИСОВКА ===
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // фон
    ctx.strokeStyle = "rgba(167,139,250,0.2)";
    ctx.strokeRect(50,100,30,40);

    // земля
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 80);
    ctx.lineTo(canvas.width, canvas.height - 120);
    ctx.strokeStyle = "#a78bfa";
    ctx.stroke();

    // персонаж
    if (img.complete) {
        ctx.drawImage(img, player.x, player.y, player.w, player.h);
    }

    // препятствия
    obstacles.forEach(o => {
        ctx.fillStyle = "#999";

        if (o.type === "ground") {
            ctx.fillRect(o.x, canvas.height - 100, o.width, o.height);
        }

        if (o.type === "air") {
            ctx.beginPath();
            ctx.arc(o.x, canvas.height - 220, 20, 0, Math.PI*2);
            ctx.fill();
        }

        if (o.type === "gap") {
            ctx.clearRect(o.x, canvas.height - 80, o.width, 80);
        }

        // текст
        ctx.fillStyle = "#fff";
        ctx.font = "10px Arial";
        ctx.fillText(o.label, o.x - 20, canvas.height - 130);
    });
}

// === ЦИКЛ ===
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// === КНОПКИ ===
function restart() {
    location.reload();
}

function menu() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
