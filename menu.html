<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лайни — путь</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #0f0f1a, #1c1c2e);
    color: white;
    overflow: hidden;
}

/* контейнер */
.container {
    position: relative;
    width: 100%;
    height: 100vh;
}

/* заголовок */
.title {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    color: #ccc;
}

/* кнопка назад */
.back {
    position: absolute;
    top: 20px;
    left: 15px;
    font-size: 18px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
}

/* canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* уровни */
.level {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #a78bfa;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(167,139,250,0.6);
}

/* подписи */
.label {
    position: absolute;
    font-size: 14px;
    color: #aaa;
    text-align: center;
    width: 120px;
}

/* аватар */
.avatar {
    position: absolute;
    width: 90px;
    transform: translate(-50%, -50%);
    transition: 0.5s;
    pointer-events: none;
}

/* кредо */
.credo {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #a78bfa;
    opacity: 0.9;
}

    @keyframes float {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-5px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.avatar {
    animation: float 2s ease-in-out infinite;
}

    .quote {
    position: absolute;
    max-width: 200px;
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.4);
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    color: #e0d4ff;
    backdrop-filter: blur(6px);
    opacity: 0;
    animation: fadeInOut 6s ease forwards;
}

/* хвостик облачка */
.quote::after {
    content: "";
    position: absolute;
    bottom: -8px;
    left: 20px;
    width: 12px;
    height: 12px;
    background: rgba(167,139,250,0.15);
    border-left: 1px solid rgba(167,139,250,0.4);
    border-bottom: 1px solid rgba(167,139,250,0.4);
    transform: rotate(45deg);
}

/* анимация */
@keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(10px); }
    20% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-10px); }
}
    
</style>
</head>

<body>

<div class="container">

<div class="title">твой путь</div>
<div class="back" onclick="goBack()">←</div>

<canvas id="bgCanvas"></canvas>
<canvas id="pathCanvas"></canvas>

<!-- уровни -->
<div class="level" style="top: 70%; left: 20%;" onclick="goLevel(1)">1</div>
<div class="label" style="top: 78%; left: 12%;">беззаботное детство</div>

<div class="level" style="top: 55%; left: 55%;" onclick="goLevel(2)">2</div>
<div class="label" style="top: 63%; left: 48%;">переходный период</div>

<div class="level" style="top: 35%; left: 30%;" onclick="goLevel(3)">3</div>
<div class="label" style="top: 43%; left: 22%;">поиск себя</div>

<div class="level" style="top: 15%; left: 65%;" onclick="goLevel(4)">4</div>
<div class="label" style="top: 23%; left: 57%;">ближе к себе</div>

<!-- аватар -->
<img src="MASHA.png" class="avatar" id="avatar">

<!-- кредо -->
<div class="credo" id="credo"></div>

</div>

<script>
// canvas
const bg = document.getElementById("bgCanvas");
const ctxBg = bg.getContext("2d");

const path = document.getElementById("pathCanvas");
const ctx = path.getContext("2d");

bg.width = path.width = window.innerWidth;
bg.height = path.height = window.innerHeight;

// === ФОН (иконки) ===
function drawIcons() {
    ctxBg.strokeStyle = "rgba(167,139,250,0.2)";
    ctxBg.lineWidth = 2;

    function circle(x,y,r){
        ctxBg.beginPath();
        ctxBg.arc(x,y,r,0,Math.PI*2);
        ctxBg.stroke();
    }

    function rect(x,y,w,h){
        ctxBg.strokeRect(x,y,w,h);
    }

    // книги
    rect(50,100,30,40);
    rect(90,100,30,40);

    // ноутбук
    rect(200,200,50,30);
    rect(210,235,30,5);

    // гантеля
    rect(300,400,10,40);
    rect(280,410,50,10);

    // яблоко (круг)
    circle(350,150,15);

    // случайные точки
    for(let i=0;i<20;i++){
        circle(Math.random()*bg.width, Math.random()*bg.height, 2);
    }
}

drawIcons();

// === ТРОПА ===
function drawPath() {
    ctx.strokeStyle = "#a78bfa";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(path.width * 0.2, path.height * 0.75);

    ctx.quadraticCurveTo(path.width * 0.4, path.height * 0.65,
                         path.width * 0.55, path.height * 0.55);

    ctx.quadraticCurveTo(path.width * 0.7, path.height * 0.45,
                         path.width * 0.3, path.height * 0.35);

    ctx.quadraticCurveTo(path.width * 0.5, path.height * 0.25,
                         path.width * 0.65, path.height * 0.15);

    ctx.quadraticCurveTo(path.width * 0.8, path.height * 0.05,
                         path.width * 0.9, -50);

    ctx.stroke();
}

drawPath();

// === АВАТАР ПО ПРОГРЕССУ ===
let progress = localStorage.getItem("level") || 1;
const avatar = document.getElementById("avatar");

const positions = {
    1: {top: "72%", left: "25%"},
    2: {top: "58%", left: "48%"},
    3: {top: "38%", left: "40%"},
    4: {top: "20%", left: "60%"}
};

avatar.style.top = positions[progress].top;
avatar.style.left = positions[progress].left;

const credos = [
"Если что-то не нравится, имей смелость это "что-то" изменить",
"Не приложив должных усилий, не жди чудесногоо результата",
"Всегда начинай с себя. Обвинение других — показатель слабости",
"Самокритика помогает лучше себя узнавать и расти",
"Изменения начинаются с осознания",
"Проблемы решаемы, а упущенное время и здоровье уже не вернуть",
"Проживай каждый день так, чтобы не жалеть ни об одном упущенном моменте"
];

function showQuote() {
    const quote = document.createElement("div");
    quote.className = "quote";

    quote.innerText = credos[Math.floor(Math.random() * credos.length)];

    // случайная позиция
    quote.style.top = Math.random() * 70 + "%";
    quote.style.left = Math.random() * 70 + "%";

    document.body.appendChild(quote);

    setTimeout(() => {
        quote.remove();
    }, 9000);
}

// каждые 3 секунды новая мысль
setInterval(showQuote, 6000);

// === ПЕРЕХОДЫ ===
function goLevel(level) {
    localStorage.setItem("level", level);
    window.location.href = "level" + level + ".html";
}

function goBack() {
    window.location.href = "welcome.html";
}
</script>

</body>
</html>
