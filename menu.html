<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лайни — путь</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #0f0f1a, #1c1c2e);
    color: white;
    overflow: hidden;
}

/* контейнер */
.container {
    position: relative;
    width: 100%;
    height: 100vh;
}

/* заголовок */
.title {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    color: #ccc;
}

/* кнопка назад */
.back {
    position: absolute;
    top: 20px;
    left: 15px;
    font-size: 18px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
}

/* canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* уровни */
.level {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #a78bfa;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(167,139,250,0.6);
}

/* подписи */
.label {
    position: absolute;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    width: 120px;
}

/* аватар */
.avatar {
    position: absolute;
    width: 90px;
    transition: 0.5s;
}

/* кредо */
.credo {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    font-size: 17px;
    color: #a78bfa;
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="title">твой путь</div>
<div class="back" onclick="goBack()">←</div>

<canvas id="bgCanvas"></canvas>
<canvas id="pathCanvas"></canvas>

<!-- уровни -->
<div class="level" style="top: 70%; left: 20%;" onclick="goLevel(1)">1</div>
<div class="label" style="top: 78%; left: 12%;">беззаботное детство</div>

<div class="level" style="top: 55%; left: 55%;" onclick="goLevel(2)">2</div>
<div class="label" style="top: 63%; left: 48%;">переходный период</div>

<div class="level" style="top: 35%; left: 30%;" onclick="goLevel(3)">3</div>
<div class="label" style="top: 43%; left: 22%;">поиск себя</div>

<div class="level" style="top: 15%; left: 65%;" onclick="goLevel(4)">4</div>
<div class="label" style="top: 23%; left: 57%;">ближе к себе</div>

<!-- аватар -->
<img src="MASHA.png" class="avatar" id="avatar">

<!-- кредо -->
<div class="credo" id="credo"></div>

</div>

<script>
// canvas
const bg = document.getElementById("bgCanvas");
const ctxBg = bg.getContext("2d");

const path = document.getElementById("pathCanvas");
const ctx = path.getContext("2d");

bg.width = path.width = window.innerWidth;
bg.height = path.height = window.innerHeight;

// === ФОН (иконки) ===
function drawIcons() {
    ctxBg.strokeStyle = "rgba(167,139,250,0.2)";
    ctxBg.lineWidth = 2;

    function circle(x,y,r){
        ctxBg.beginPath();
        ctxBg.arc(x,y,r,0,Math.PI*2);
        ctxBg.stroke();
    }

    function rect(x,y,w,h){
        ctxBg.strokeRect(x,y,w,h);
    }

    // книги
    rect(50,100,30,40);
    rect(90,100,30,40);

    // ноутбук
    rect(200,200,50,30);
    rect(210,235,30,5);

    // гантеля
    rect(300,400,10,40);
    rect(280,410,50,10);

    // яблоко (круг)
    circle(350,150,15);

    // случайные точки
    for(let i=0;i<20;i++){
        circle(Math.random()*bg.width, Math.random()*bg.height, 2);
    }
}

drawIcons();

// === ТРОПА ===
function drawPath() {
    ctx.strokeStyle = "#a78bfa";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(path.width * 0.2, path.height * 0.75);

    ctx.quadraticCurveTo(path.width * 0.4, path.height * 0.65,
                         path.width * 0.55, path.height * 0.55);

    ctx.quadraticCurveTo(path.width * 0.7, path.height * 0.45,
                         path.width * 0.3, path.height * 0.35);

    ctx.quadraticCurveTo(path.width * 0.5, path.height * 0.25,
                         path.width * 0.65, path.height * 0.15);

    ctx.quadraticCurveTo(path.width * 0.8, path.height * 0.05,
                         path.width * 0.9, -50);

    ctx.stroke();
}

drawPath();

// === АВАТАР ПО ПРОГРЕССУ ===
let progress = localStorage.getItem("level") || 1;
const avatar = document.getElementById("avatar");

const positions = {
    1: {top: "68%", left: "18%"},
    2: {top: "53%", left: "53%"},
    3: {top: "33%", left: "28%"},
    4: {top: "13%", left: "63%"}
};

avatar.style.top = positions[progress].top;
avatar.style.left = positions[progress].left;

// === КРЕДО ===
const credos = [
"Не нравится – меняй. Не можешь изменить — принимай.",
"Всегда начинай с себя. Обвинять других — последнее дело.",
"Самокритика — двигатель роста.",
"Изменения начинаются с осознания.",
"Неужели эти сущие мелочи стоят наших нервов?."   
];

document.getElementById("credo").innerText =
    credos[Math.floor(Math.random()*credos.length)];

// === ПЕРЕХОДЫ ===
function goLevel(level) {
    localStorage.setItem("level", level);
    window.location.href = "level" + level + ".html";
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
