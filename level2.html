<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лайни — уровень 2</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0e0e1a;
    font-family: Arial;
}

canvas {
    display: block;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,20,40,0.95);
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
    display: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #a78bfa;
    color: white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="gameOver" class="overlay">
    ничего страшного, мы же не роботы  
    <br>давай попробуем снова!
    <br><br>
    <button onclick="restart()">ещё раз</button>
</div>

<div id="win" class="overlay">
    ты справилась 💜  
    <br>идём дальше
    <br><br>
    <button onclick="menu()">дальше</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === ПЕРСОНАЖ ===
const img = new Image();
img.src = "MASHA1.png";

let time = 0;

const player = {
    x: 100,
    y: canvas.height - 200,
    w: 90,
    h: 120,
    dy: 0,
    gravity: 0.6,
    jumps: 0,
    maxJumps: 2
};

// === ПРЕПЯТСТВИЯ ===
let obstacles = [];

function randomObstacle(x) {
    const types = ["ground", "air", "gap"];
    const type = types[Math.floor(Math.random()*types.length)];

    return {
        x: x,
        type: type,
        label: getLabel(type)
    };
}

function getLabel(type) {
    const map = {
        ground: ["не стесняйся","все получится","домашка"],
        air: ["олимпиады","неуверенность","скука"],
        gap: ["страх","сомнения"]
    };
    const arr = map[type];
    return arr[Math.floor(Math.random()*arr.length)];
}

for (let i = 1; i < 20; i++) {
    obstacles.push(randomObstacle(i * 450));
}

// === УПРАВЛЕНИЕ ===
window.addEventListener("keydown", jump);
window.addEventListener("touchstart", jump);

function jump() {
    if (player.jumps < player.maxJumps) {
        player.dy = -13;
        player.jumps++;
    }
}

// === ЛОГИКА ===
let gameOver = false;
let win = false;

function update() {
    if (gameOver || win) return;

    time += 0.05;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= canvas.height - 200) {
        player.y = canvas.height - 200;
        player.jumps = 0;
    }

    obstacles.forEach(o => o.x -= 4);

    obstacles.forEach(o => {
        if (!o.renderY) return;

        if (
            player.x < o.x + o.renderW &&
            player.x + player.w > o.x &&
            player.y < o.renderY + o.renderH &&
            player.y + player.h > o.renderY
        ) {
            lose();
        }
    });

    if (obstacles[obstacles.length-1].x < 100) {
        win = true;
        document.getElementById("win").style.display = "block";
    }
}

function lose() {
    gameOver = true;
    document.getElementById("gameOver").style.display = "block";
}

// === ОТРИСОВКА ===
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // === ПАРАЛЛАКС ===
    ctx.fillStyle = "#141428";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // дальний слой
    ctx.fillStyle = "rgba(167,139,250,0.05)";
    for (let i = 0; i < 10; i++) {
        ctx.fillRect((i*300 - time*20)%canvas.width, 100 + i*50, 200, 2);
    }

    // === ФРАЗЫ ===
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.font = "14px Arial";

    const phrases = [
        "я справлюсь",
        "всё получится",
        "я уже сильнее",
        "это не навсегда",
        "двигаюсь дальше"
    ];

    for (let i = 0; i < 15; i++) {
        let x = (i*250 - time*60) % canvas.width;
        let y = (i*80) % canvas.height;
        ctx.fillText(phrases[i%phrases.length], x, y);
    }

    // === СКЛОН ===
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 60);
    ctx.lineTo(canvas.width, canvas.height - 260);
    ctx.strokeStyle = "#a78bfa";
    ctx.lineWidth = 3;
    ctx.stroke();

    // === СВЕТ ВВЕРХУ ===
    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0, "rgba(167,139,250,0.25)");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // === ПЕРСОНАЖ (АНИМАЦИЯ) ===
    if (img.complete) {
        let bob = Math.sin(time*2) * 4;
        ctx.drawImage(
            img,
            player.x,
            player.y + bob,
            player.w,
            player.h
        );
    }

    // === ПРЕПЯТСТВИЯ ===
    obstacles.forEach(o => {
        let y;

        if (o.type === "ground") y = canvas.height - 180;
        else if (o.type === "air") y = canvas.height - 320;
        else {
            ctx.fillStyle = "#0e0e1a";
            ctx.fillRect(o.x, canvas.height - 80, 100, 80);
            return;
        }

        let w = 80;
        let h = 50;

        ctx.fillStyle = "rgba(167,139,250,0.25)";
        ctx.strokeStyle = "rgba(167,139,250,0.8)";

        roundRect(ctx, o.x, y, w, h, 12);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText(o.label, o.x + 10, y + 28);

        o.renderY = y;
        o.renderW = w;
        o.renderH = h;
    });
}

// === ЦИКЛ ===
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// === КНОПКИ ===
function restart() {
    location.reload();
}

function menu() {
    window.location.href = "menu.html";
}

// === ФИГУРА ===
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}
</script>

</body>
</html>
